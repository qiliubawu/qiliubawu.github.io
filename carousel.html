<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>椭圆无限滚动轮播</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(ellipse at center,#1a1a2e 0%,#0a0a14 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,sans-serif;overflow:hidden}
.stage{position:relative;width:700px;height:400px;perspective:800px;perspective-origin:50% 30%}
.carousel{position:absolute;inset:0;transform-style:preserve-3d}
.item{position:absolute;width:200px;height:140px;border-radius:16px;overflow:hidden;left:50%;top:50%;margin-left:-100px;margin-top:-70px;transition:opacity .3s;cursor:pointer}
.item img{width:100%;height:100%;object-fit:cover;display:block}
.item::after{content:'';position:absolute;inset:0;border-radius:16px;box-shadow:inset 0 1px 0 rgba(255,255,255,.1),inset 0 -1px 0 rgba(0,0,0,.3)}
.glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:200px;background:radial-gradient(ellipse,rgba(99,102,241,.06),transparent 70%);pointer-events:none;border-radius:50%}

.dots{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);cursor:pointer;transition:.3s}
.dot.active{background:rgba(255,255,255,.6);width:24px;border-radius:4px}
.arrow{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;color:rgba(255,255,255,.5);font-size:20px;transition:.3s;user-select:none}
.arrow:hover{background:rgba(255,255,255,.12);color:#fff}
.arrow.left{left:-60px}
.arrow.right{right:-60px}

.info{position:fixed;bottom:20px;color:rgba(255,255,255,.15);font-size:12px}
</style>
</head>
<body>
<div class="stage">
  <div class="carousel" id="carousel"></div>
  <div class="glow"></div>
  <div class="arrow left" onclick="prev()">‹</div>
  <div class="arrow right" onclick="next()">›</div>
</div>
<div class="dots" id="dots"></div>
<p class="info">椭圆 3D 无限滚动</p>

<script>
const items = [
  {img:"https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=280",label:"山峰"},
  {img:"https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=400&h=280",label:"森林"},
  {img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400&h=280",label:"海滩"},
  {img:"https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400&h=280",label:"阳光"},
  {img:"https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=400&h=280",label:"山谷"},
  {img:"https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=400&h=280",label:"秋色"},
  {img:"https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=400&h=280",label:"瀑布"},
  {img:"https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=400&h=280",label:"草原"},
];

const carousel=document.getElementById('carousel');
const dotsEl=document.getElementById('dots');
const N=items.length;
let angle=0,animId=null,autoDir=1;

// Build DOM
items.forEach((_,i)=>{
  const div=document.createElement('div');div.className='item';
  const img=document.createElement('img');img.src=items[i].img;img.alt=items[i].label;
  div.appendChild(img);carousel.appendChild(div);
});
dotsEl.innerHTML=items.map((_,i)=>`<div class="dot" onclick="goTo(${i})"></div>`).join('');

function render(){
  const dots=document.querySelectorAll('.dot');
  for(let i=0;i<N;i++){
    const a=((angle+i*(360/N))%360)*Math.PI/180;
    const rx=220,ry=70; // elliptical radii
    const x=Math.cos(a)*rx;
    const z=Math.sin(a)*ry;
    const depth=(z+ry)/(2*ry); // 0..1, 0.5 = center front
    const scale=0.5+depth*0.8;
    const opacity=0.3+depth*0.7;

    const el=carousel.children[i];
    el.style.transform=`translate(${x}px,${-z*0.6}px) translateZ(${z}px) scale(${scale})`;
    el.style.opacity=opacity;
    el.style.zIndex=Math.round(depth*100);

    // Highlight the frontmost item
    const ia=((i+Math.round(N/2))%N);
    dots[i].classList.toggle('active',ia===0||(ia===N&&i===0));
  }

  // Find which item is closest to front
  let frontIdx=0,frontDepth=0;
  for(let i=0;i<N;i++){
    const a=((angle+i*(360/N))%360)*Math.PI/180;
    const z=Math.sin(a)*ry;const depth=(z+ry)/(2*ry);
    if(depth>frontDepth){frontDepth=depth;frontIdx=i}
  }
  dots.forEach((d,i)=>d.classList.toggle('active',i===frontIdx));
}

function animate(){
  angle+=0.3*autoDir;
  render();
  animId=requestAnimationFrame(animate);
}

function prev(){autoDir=-1;setTimeout(()=>autoDir=1,600)}
function next(){autoDir=1}
function goTo(i){
  angle=-i*(360/N);
  render();
}

// Drag support
let dragging=false,startX=0,startAngle=0;
const stage=document.querySelector('.stage');
stage.addEventListener('pointerdown',e=>{dragging=true;startX=e.clientX;startAngle=angle;stage.setPointerCapture(e.pointerId)});
stage.addEventListener('pointermove',e=>{if(!dragging)return;const dx=e.clientX-startX;angle=startAngle+dx*0.3;render()});
stage.addEventListener('pointerup',()=>{dragging=false});

// Touch wheel
stage.addEventListener('wheel',e=>{e.preventDefault();angle+=e.deltaY*0.1;render()},{passive:false});

render();animate();
</script>
</body>
</html>
