<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>椭圆无限滚动轮播</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:#0f0f1a;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,sans-serif;overflow:hidden}

.stage{width:900px;height:500px;position:relative}

.item{position:absolute;width:220px;height:150px;border-radius:16px;overflow:hidden;left:50%;top:50%;margin-left:-110px;margin-top:-75px;box-shadow:0 8px 32px rgba(0,0,0,.5);cursor:pointer}
.item img{width:100%;height:100%;object-fit:cover;display:block}
.item .title{position:absolute;bottom:0;left:0;right:0;padding:12px 16px;background:linear-gradient(0,rgba(0,0,0,.7),transparent);color:#fff;font-size:14px;font-weight:600}

.controls{display:flex;align-items:center;gap:20px;margin-top:24px}
.arrow{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.5);font-size:22px;transition:.3s;user-select:none}
.arrow:hover{background:rgba(255,255,255,.18);color:#fff}
.dots{display:flex;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);cursor:pointer;transition:.3s}
.dot.active{background:#fff;width:24px;border-radius:4px}

.info{position:fixed;bottom:20px;color:rgba(255,255,255,.1);font-size:12px;pointer-events:none}
</style>
</head>
<body>
<div class="stage" id="stage"></div>
<div class="controls">
  <div class="arrow" onclick="prev()">‹</div>
  <div class="dots" id="dots"></div>
  <div class="arrow" onclick="next()">›</div>
</div>
<p class="info">鼠标悬停暂停 · 点击高亮 · 箭头切换 · 拖拽/滚轮</p>

<script>
const data=[
  {img:"https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=500&h=340",title:"壮丽山峰"},
  {img:"https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=500&h=340",title:"静谧森林"},
  {img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500&h=340",title:"热带海滩"},
  {img:"https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=500&h=340",title:"晨光森林"},
  {img:"https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=500&h=340",title:"迷雾山谷"},
  {img:"https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=500&h=340",title:"金色秋色"},
  {img:"https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=500&h=340",title:"飞流瀑布"},
  {img:"https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=500&h=340",title:"辽阔草原"},
];

const N=data.length;
const stage=document.getElementById('stage');
const dotsEl=document.getElementById('dots');
const items=[];
let angle=0,speed=0.05,hoveredIdx=-1,animId;

// Build cards
data.forEach((d,i)=>{
  const el=document.createElement('div');el.className='item';
  el.innerHTML=`<img src="${d.img}" alt="${d.title}"><div class="title">${d.title}</div>`;
  el.addEventListener('mouseenter',()=>{hoveredIdx=i});
  el.addEventListener('mouseleave',()=>{hoveredIdx=-1});
  stage.appendChild(el);
  items.push(el);
});
dotsEl.innerHTML=data.map((_,i)=>`<div class="dot" onclick="goTo(${i})"></div>`).join('');

function getFrontIdx(){
  let fi=0,mz=-9999;
  for(let i=0;i<N;i++){
    const a=((angle+i*(360/N))%360)*Math.PI/180;
    const z=Math.sin(a)*120;
    if(z>mz){mz=z;fi=i}
  }
  return fi;
}

function render(){
  const dots=dotsEl.querySelectorAll('.dot');
  const rx=320,ry=120;
  
  // If hovering, snap the hovered item to frontmost position
  let displayAngle=angle;
  if(hoveredIdx>=0){
    const frontIdx=getFrontIdx();
    if(frontIdx!==hoveredIdx){
      // Rotate to bring hovered item to front
      const targetAngle=-hoveredIdx*(360/N);
      angle+=(targetAngle-angle)*0.15;
    }
  }

  for(let i=0;i<N;i++){
    const a=((angle+i*(360/N))%360)*Math.PI/180;
    const x=Math.cos(a)*rx;
    const z=Math.sin(a)*ry;
    const scale=0.5+(z+ry)/(2*ry)*0.6;
    const opacity=0.3+(z+ry)/(2*ry)*0.7;

    items[i].style.transform=`translate(${x}px,${-z*0.4}px) scale(${scale})`;
    items[i].style.opacity=opacity;
    items[i].style.zIndex=Math.floor((z+ry)*10);
  }

  const frontIdx=getFrontIdx();
  dots.forEach((d,i)=>d.classList.toggle('active',i===frontIdx));
}

function loop(){
  if(hoveredIdx<0) angle+=speed;
  render();
  animId=requestAnimationFrame(loop);
}

function snapTo(target) {
  angle=target;render();
}

function prev(){
  const fi=getFrontIdx();
  const ti=(fi-1+N)%N;
  snapTo(-ti*(360/N));
}
function next(){
  const fi=getFrontIdx();
  const ti=(fi+1)%N;
  snapTo(-ti*(360/N));
}
function goTo(i){snapTo(-i*(360/N))}

// Drag
let dragging=false,sx=0,sa=0;
stage.addEventListener('pointerdown',e=>{dragging=true;sx=e.clientX;sa=angle;hoveredIdx=-1});
stage.addEventListener('pointermove',e=>{if(!dragging)return;angle=sa+(e.clientX-sx)*0.2;render()});
stage.addEventListener('pointerup',()=>{dragging=false});

// Wheel
stage.addEventListener('wheel',e=>{e.preventDefault();angle-=e.deltaY*0.03;render()},{passive:false});

loop();
</script>
</body>
</html>
