<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZenMart - 电商平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#333;min-width:320px}

/* Top nav bar */
.top-nav{background:#ff5000;color:#fff;height:48px;display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:100}
.top-nav .search-box{display:flex;align-items:center;background:#fff;border-radius:20px;overflow:hidden;flex:1;max-width:560px;height:34px;margin:0 auto}
.top-nav .search-box input{flex:1;border:none;outline:none;padding:0 14px;font-size:14px;color:#333}
.top-nav .search-box input::placeholder{color:#bbb}
.top-nav .search-box button{background:#ff5000;color:#fff;border:none;padding:0 20px;height:34px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.top-nav .logo{display:flex;align-items:center;gap:6px;color:#fff;font-size:18px;font-weight:800;text-decoration:none;flex-shrink:0}
.top-nav .logo svg{width:26px;height:26px}
.top-nav .nav-right{display:flex;align-items:center;gap:18px;flex-shrink:0;font-size:13px}
.top-nav .nav-right a{color:#fff;text-decoration:none;white-space:nowrap;transition:.2s}
.top-nav .nav-right a:hover{opacity:.8}
.top-nav .nav-right .cart-link{position:relative}
.top-nav .nav-right .cart-link .cnt{position:absolute;top:-6px;right:-12px;background:#fff;color:#ff5000;border-radius:10px;padding:0 5px;font-size:10px;font-weight:700;line-height:16px;min-width:16px;text-align:center}

/* Banner */
.banner{margin:0;overflow:hidden;position:relative;height:200px;background:#f0f0f0;cursor:pointer}
@media(min-width:640px){.banner{height:340px}}
@media(min-width:900px){.banner{height:420px;margin:12px;border-radius:16px}}
.banner img{width:100%;height:100%;object-fit:cover;transition:opacity .5s}
.banner .dots{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:2}
.banner .dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer;transition:.3s}
.banner .dot.active{background:#fff;width:24px;border-radius:5px}
.banner .arrow{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;background:rgba(0,0,0,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;color:#fff;font-size:22px;transition:.2s;display:none}
@media(min-width:640px){.banner .arrow{display:flex}}
.banner .arrow:hover{background:rgba(0,0,0,.4)}
.banner .arrow.left{left:16px}
.banner .arrow.right{right:16px}

/* Categories */
.cats{margin:12px 10px;display:grid;grid-template-columns:repeat(5,1fr);gap:8px 4px}
@media(min-width:640px){.cats{grid-template-columns:repeat(10,1fr);margin:16px 12px;gap:12px 8px}}
.cat-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;padding:8px 2px;border-radius:10px;transition:.2s;font-size:12px;color:#333;text-align:center;background:#fff}
.cat-item:hover,.cat-item.active{color:#ff5000;box-shadow:0 2px 12px rgba(255,80,0,.08)}
.cat-item .icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden}
@media(min-width:640px){.cat-item .icon{width:60px;height:60px;border-radius:14px;font-size:26px}}
.cat-item .icon img{width:100%;height:100%;object-fit:cover}
.cat-item:hover .icon{transform:scale(1.05)}

/* Section header */
.sec-header{display:flex;justify-content:space-between;align-items:center;padding:14px 10px 8px}
.sec-header h3{font-size:16px;font-weight:700;color:#111}
.sec-header span{font-size:12px;color:#999}

/* Waterfall grid */
.grid{column-count:2;column-gap:8px;padding:0 10px}
@media(min-width:600px){.grid{column-count:3}}
@media(min-width:900px){.grid{column-count:4}}

.card{break-inside:avoid;background:#fff;border-radius:12px;overflow:hidden;margin-bottom:8px;cursor:pointer;transition:.2s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.card .img-wrap{position:relative;overflow:hidden}
.card .img-wrap img{width:100%;display:block;transition:.3s}
.card:hover .img-wrap img{transform:scale(1.05)}
.card .badge-row{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:3px}
.card .tag{font-size:10px;padding:2px 8px;border-radius:3px;font-weight:600;color:#fff;width:fit-content}
.tag-tmall{background:linear-gradient(135deg,#ff0036,#c4002b)}
.tag-tb{background:linear-gradient(135deg,#ff5000,#e04800)}
.tag-new{background:linear-gradient(135deg,#07c160,#06ad56)}
.card .body{padding:8px 10px 10px}
.card .title{font-size:13px;line-height:1.4;color:#222;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:6px}
.card .shop{font-size:11px;color:#999;margin-bottom:4px}
.card .price-row{display:flex;align-items:baseline;gap:4px}
.card .price{color:#ff5000;font-size:18px;font-weight:700}
.card .price .yen{font-size:12px}
.card .sold{font-size:11px;color:#999;margin-left:auto}

/* Cart float button */
.cart-float{position:fixed;bottom:80px;right:16px;width:48px;height:48px;background:#ff5000;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(255,80,0,.4);cursor:pointer;z-index:50;transition:.2s;font-size:22px}
.cart-float:hover{transform:scale(1.08)}
.cart-float .badge{position:absolute;top:-4px;right:-4px;background:#ff0036;color:#fff;width:20px;height:20px;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700}

/* Cart overlay */
.cart-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200}
.cart-overlay.open{display:block}
.cart-panel{position:fixed;right:0;top:0;bottom:0;width:100%;max-width:380px;background:#fff;z-index:201;transform:translateX(100%);transition:.3s;display:flex;flex-direction:column}
.cart-panel.open{transform:translateX(0)}
.cart-top{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid #eee}
.cart-top h3{font-size:17px}.cart-top button{background:none;border:none;font-size:12px;color:#999;cursor:pointer}
.cart-list{flex:1;overflow-y:auto;padding:12px}
.cart-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5;align-items:center}
.cart-item img{width:64px;height:64px;border-radius:8px;object-fit:cover;flex-shrink:0}
.cart-item .ci-info{flex:1;min-width:0}
.cart-item .ci-title{font-size:13px;color:#333;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cart-item .ci-price{font-size:14px;color:#ff5000;font-weight:700;margin-top:4px}
.cart-item .ci-qty{display:flex;align-items:center;gap:0;margin-top:6px}
.cart-item .ci-qty button{width:26px;height:26px;border:1px solid #ddd;background:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#333}
.cart-item .ci-qty span{padding:0 12px;font-size:13px}
.cart-bottom{padding:16px;border-top:1px solid #eee}
.cart-bottom .total{display:flex;justify-content:space-between;font-size:16px;font-weight:700;margin-bottom:12px}
.cart-bottom .total span:last-child{color:#ff5000}
.cart-bottom .checkout{width:100%;padding:14px;background:#ff5000;color:#fff;border:none;border-radius:24px;font-size:16px;font-weight:700;cursor:pointer}

/* Order page */
.order-page{display:none;padding:16px}
.order-page.active{display:block}
.order-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px}
.order-card .steps{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.order-card .step{padding:4px 12px;border-radius:12px;font-size:11px;background:#f5f5f5;color:#999}
.order-card .step.done{background:#fff2e8;color:#ff5000}
.order-card .step.active{background:#ff5000;color:#fff}
.order-card .oi-row{display:flex;align-items:center;gap:10px;padding:8px 0}
.order-card .oi-row img{width:48px;height:48px;border-radius:8px;object-fit:cover}
.order-card .oi-total{text-align:right;font-size:15px;font-weight:700;padding-top:10px;border-top:1px solid #f5f5f5;margin-top:10px}

.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}

.empty-cart{text-align:center;padding:60px 20px;color:#bbb}
.empty-cart .icon{font-size:48px;margin-bottom:12px}
</style>
</head>
<body>

<header class="top-nav">
  <a class="logo" href="#" onclick="event.preventDefault()">
    <svg viewBox="0 0 40 40" fill="none"><rect x="5" y="5" width="14" height="14" rx="4" fill="#fff"/><rect x="21" y="5" width="14" height="14" rx="4" fill="#fff" opacity=".9"/><rect x="5" y="21" width="14" height="14" rx="4" fill="#fff" opacity=".85"/><rect x="21" y="21" width="14" height="14" rx="4" fill="#fff" opacity=".75"/><path d="M12 12h0M28 12h0M12 28h0M28 28h0" stroke="#ff5000" stroke-width="2.5" stroke-linecap="round"/></svg>
    ZenMart
  </a>
  <div class="search-box">
    <input id="searchInput" placeholder="搜索你想要的商品" oninput="renderProducts()">
    <button>搜索</button>
  </div>
  <div class="nav-right">
    <a href="#" onclick="event.preventDefault()">用户中心</a>
    <a class="cart-link" href="#" onclick="event.preventDefault();toggleCart()">购物车<span class="cnt" id="cartCountSmall">0</span></a>
    <a href="#" onclick="event.preventDefault()">帮助中心</a>
  </div>
</header>

<div class="banner" id="bannerDiv">
  <div class="arrow left" onclick="bannerPrev()">‹</div>
  <div id="bannerImgs"></div>
  <div class="arrow right" onclick="bannerNext()">›</div>
  <div class="dots" id="bannerDots"></div>
</div>

<div class="cats" id="catBar"></div>

<div id="page-shop">
  <div class="sec-header"><h3>为你推荐</h3><span>实时更新</span></div>
  <div class="grid" id="products"></div>
</div>

<div id="page-orders" class="order-page"><div id="orderList"></div></div>


<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-panel" id="cartPanel">
  <div class="cart-top"><h3>购物车</h3><button onclick="cart=[];updateCart();toggleCart()">清空</button></div>
  <div class="cart-list" id="cartList"></div>
  <div class="cart-bottom" id="cartBottom">
    <div class="total"><span>合计</span><span id="cartTotal">¥0</span></div>
    <button class="checkout" onclick="checkout()">立即结算</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Real product images from Unsplash
const products = [
  {id:1,title:"Apple AirPods Pro 二代 主动降噪无线蓝牙耳机",cat:"数码",price:1799,op:2399,img:"https://images.unsplash.com/photo-1588423771073-b8903fbb85b5?w=400&h=400&fit=crop",shop:"Apple旗舰店",tag:"tmall",sold:"10万+"},
  {id:2,title:"华为 Mate 60 Pro 麒麟芯片 卫星通话 512GB",cat:"数码",price:6999,op:null,img:"https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?w=400&h=400&fit=crop",shop:"华为官方旗舰店",tag:"tmall",sold:"5万+"},
  {id:3,title:"Sony WH-1000XM5 头戴式降噪耳机",cat:"数码",price:2499,op:2999,img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=400&fit=crop",shop:"Sony旗舰店",tag:"tmall",sold:"2万+"},
  {id:4,title:"夏季法式碎花连衣裙 收腰显瘦",cat:"女装",price:189,op:399,img:"https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=400&h=400&fit=crop",shop:"韩都衣舍旗舰店",tag:"tb",sold:"8万+"},
  {id:5,title:"冰丝阔腿裤 夏季薄款高腰垂感",cat:"女装",price:129,op:259,img:"https://images.unsplash.com/photo-1594938298603-c8148c4dae35?w=400&h=400&fit=crop",shop:"茵曼旗舰店",tag:"tb",sold:"5万+"},
  {id:6,title:"优衣库 AIRism 科技防晒衣 UPF50+",cat:"男装",price:199,op:299,img:"https://images.unsplash.com/photo-1596755094514-f87e34085b2c?w=400&h=400&fit=crop",shop:"优衣库旗舰店",tag:"tb",sold:"20万+"},
  {id:7,title:"纯棉短袖T恤 男士宽松潮流印花",cat:"男装",price:89,op:169,img:"https://images.unsplash.com/photo-1581655353564-df123a1eb820?w=400&h=400&fit=crop",shop:"森马官方店",tag:"tb",sold:"15万+"},
  {id:8,title:"Nike Air Zoom Pegasus 40 跑步鞋",cat:"鞋靴",price:899,op:1299,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&h=400&fit=crop",shop:"Nike旗舰店",tag:"tmall",sold:"3万+"},
  {id:9,title:"Adidas Ultra Boost 女款跑鞋",cat:"鞋靴",price:799,op:1099,img:"https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=400&h=400&fit=crop",shop:"Adidas旗舰店",tag:"tmall",sold:"2万+"},
  {id:10,title:"SK-II 神仙水 护肤精华露 230ml",cat:"美妆",price:1540,op:null,img:"https://images.unsplash.com/photo-1570194065650-d99fb4f1b609?w=400&h=400&fit=crop",shop:"SK-II旗舰店",tag:"tmall",sold:"3万+"},
  {id:11,title:"Dyson 戴森 V15 无线吸尘器",cat:"家电",price:4990,op:5990,img:"https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400&h=400&fit=crop",shop:"Dyson旗舰店",tag:"tmall",sold:"1万+"},
  {id:12,title:"Dyson 空气净化暖风扇 HP09",cat:"家电",price:5690,op:null,img:"https://images.unsplash.com/photo-1585771724684-38269d6639fd?w=400&h=400&fit=crop",shop:"Dyson旗舰店",tag:"tmall",sold:"5千+"},
  {id:13,title:"网易严选 人体工学椅 全网透气",cat:"家居",price:1299,op:1999,img:"https://images.unsplash.com/photo-1592078615290-033ee584e267?w=400&h=400&fit=crop",shop:"网易严选旗舰店",tag:"tb",sold:"1.5万+"},
  {id:14,title:"北欧简约落地灯 LED护眼",cat:"家居",price:299,op:499,img:"https://images.unsplash.com/photo-1507473885765-e6ed057ab6fe?w=400&h=400&fit=crop",shop:"宜家家居",tag:"tb",sold:"8千+"},
  {id:15,title:"Lululemon Align 高腰瑜伽裤",cat:"运动",price:750,op:null,img:"https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=400&h=400&fit=crop",shop:"Lululemon旗舰店",tag:"new",sold:"5千+"},
  {id:16,title:"宝宝纯棉连体衣 新生儿礼盒",cat:"母婴",price:159,op:299,img:"https://images.unsplash.com/photo-1522771930-78848d9293e8?w=400&h=400&fit=crop",shop:"全棉时代旗舰店",tag:"tmall",sold:"2万+"},
  {id:17,title:"三只松鼠坚果大礼包 每日坚果",cat:"食品",price:139,op:199,img:"https://images.unsplash.com/photo-1601004890429-58b7fd3d5e37?w=400&h=400&fit=crop",shop:"三只松鼠旗舰店",tag:"tb",sold:"30万+"},
  {id:18,title:"空刻意面 番茄肉酱意面 5盒装",cat:"食品",price:69,op:99,img:"https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=400&h=400&fit=crop",shop:"空刻旗舰店",tag:"new",sold:"10万+"},
];

// Banner images
const banners = [
  "https://images.unsplash.com/photo-1607082348824-0a96f2a175e3?w=1200&h=480&fit=crop",
  "https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1200&h=480&fit=crop",
  "https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a?w=1200&h=480&fit=crop",
  "https://images.unsplash.com/photo-1607082349566-187342175e2f?w=1200&h=480&fit=crop",
];
let bannerIdx = 0, bannerTimer = null;
function showBanner(i) {
  bannerIdx = i;
  document.getElementById('bannerImgs').innerHTML = `<img src="${banners[i]}" alt="">`;
  document.querySelectorAll('#bannerDots .dot').forEach((d,j)=>d.classList.toggle('active',j===i));
}
function bannerPrev() { showBanner((bannerIdx-1+banners.length)%banners.length); resetBannerTimer(); }
function bannerNext() { showBanner((bannerIdx+1)%banners.length); resetBannerTimer(); }
function resetBannerTimer() { clearInterval(bannerTimer); bannerTimer = setInterval(bannerNext,4000); }
function initBanner() {
  document.getElementById('bannerDots').innerHTML = banners.map((_,i)=>`<div class="dot ${i===0?'active':''}" onclick="showBanner(${i});resetBannerTimer()"></div>`).join('');
  showBanner(0);
  bannerTimer = setInterval(bannerNext,4000);
}

// Categories
// Categories with real images
const cats = [
  {name:"女装",img:"https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=120&h=120&fit=crop"},
  {name:"男装",img:"https://images.unsplash.com/photo-1617137968427-85924c800a22?w=120&h=120&fit=crop"},
  {name:"鞋靴",img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=120&h=120&fit=crop"},
  {name:"数码",img:"https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?w=120&h=120&fit=crop"},
  {name:"家电",img:"https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=120&h=120&fit=crop"},
  {name:"美妆",img:"https://images.unsplash.com/photo-1570194065650-d99fb4f1b609?w=120&h=120&fit=crop"},
  {name:"运动",img:"https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=120&h=120&fit=crop"},
  {name:"母婴",img:"https://images.unsplash.com/photo-1522771930-78848d9293e8?w=120&h=120&fit=crop"},
  {name:"家居",img:"https://images.unsplash.com/photo-1507473885765-e6ed057ab6fe?w=120&h=120&fit=crop"},
  {name:"食品",img:"https://images.unsplash.com/photo-1601004890429-58b7fd3d5e37?w=120&h=120&fit=crop"},
];
let activeCat = "全部";
function renderCats() {
  const bar = document.getElementById('catBar');
  bar.innerHTML = cats.map(c=>`
    <div class="cat-item ${activeCat===c.name?'active':''}" onclick="activeCat='${c.name}';renderCats();renderProducts()">
      <div class="icon"><img src="${c.img}" alt="${c.name}" loading="lazy" onerror="this.style.display='none'"></div>
      ${c.name}
    </div>
  `).join('');
}

let cart = [];
let orders = [];

function renderProducts() {
  const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
  const filtered = products.filter(p=>
    p.title.toLowerCase().includes(q) && (activeCat==='全部'||p.cat===activeCat)
  );
  document.getElementById('products').innerHTML = filtered.map(p=>`
    <div class="card">
      <div class="img-wrap">
        <img src="${p.img}" alt="${p.title}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400&h=400&fit=crop'">
        ${p.tag?`<div class="badge-row"><span class="tag tag-${p.tag}">${p.tag==='tmall'?'天猫':p.tag==='tb'?'淘宝':'新品'}</span></div>`:''}
      </div>
      <div class="body">
        <div class="title">${p.title}</div>
        <div class="shop">${p.shop}</div>
        <div class="price-row">
          <span class="price"><span class="yen">¥</span>${p.price}</span>
          ${p.op?`<span style="font-size:12px;color:#999;text-decoration:line-through">¥${p.op}</span>`:''}
          <span class="sold">${p.sold}人付款</span>
        </div>
        <button style="margin-top:8px;width:100%;padding:6px;border-radius:16px;border:1px solid #ff5000;background:#fff;color:#ff5000;font-size:12px;font-weight:600;cursor:pointer" 
          onclick="event.stopPropagation();addToCart(${p.id})">加入购物车</button>
      </div>
    </div>
  `).join('');
}

function addToCart(id) {
  const e = cart.find(i=>i.id===id);
  if(e) e.qty++; else {const p=products.find(p=>p.id===id); cart.push({...p,qty:1});}
  updateCart(); toast('已加入购物车');
}
function removeCart(id) { cart=cart.filter(i=>i.id!==id); updateCart(); }
function qtyChange(id,d) {
  const i=cart.find(x=>x.id===id); if(!i)return; i.qty+=d;
  if(i.qty<=0){removeCart(id);return} updateCart();
}
function updateCart() {
  const count = cart.reduce((s,i)=>s+i.qty,0);
  const el = document.getElementById('cartCountSmall');
  if(el) el.textContent = count;
  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  document.getElementById('cartTotal').textContent = '¥'+total;
  const list = document.getElementById('cartList');
  if(!cart.length){list.innerHTML='<div class="empty-cart"><div class="icon">🛒</div><div>购物车是空的</div></div>';}
  else list.innerHTML=cart.map(i=>`
    <div class="cart-item">
      <img src="${i.img}" onerror="this.src='https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=200&h=200'">
      <div class="ci-info">
        <div class="ci-title">${i.title}</div>
        <div class="ci-price">¥${i.price * i.qty}</div>
        <div class="ci-qty">
          <button onclick="qtyChange(${i.id},-1)">−</button><span>${i.qty}</span>
          <button onclick="qtyChange(${i.id},1)">+</button>
        </div>
      </div>
    </div>
  `).join('');
}
function toggleCart() {
  document.getElementById('cartOverlay').classList.toggle('open');
  document.getElementById('cartPanel').classList.toggle('open');
}
function checkout() {
  if(!cart.length) return;
  orders.unshift({id:Date.now(),items:[...cart],total:cart.reduce((s,i)=>s+i.price*i.qty,0),time:new Date().toLocaleString('zh-CN')});
  cart=[]; updateCart(); toggleCart(); toast('下单成功！');
  showPage('orders');
}
function showPage(p) {
  document.getElementById('page-shop').style.display=p==='shop'?'block':'none';
  document.getElementById('page-orders').classList.toggle('active',p==='orders');
  if(p==='orders') renderOrders();
}
function renderOrders() {
  const c=document.getElementById('orderList');
  if(!orders.length){c.innerHTML='<div style="text-align:center;color:#bbb;padding:60px 0">暂无订单</div>';return}
  c.innerHTML=orders.map(o=>`
    <div class="order-card">
      <div class="steps">
        <span class="step done">已下单</span><span class="step done">已支付</span>
        <span class="step active">配货中</span><span>→</span>
        <span class="step">运输中</span><span>→</span><span class="step">已签收</span>
      </div>
      ${o.items.map(i=>`<div class="oi-row"><img src="${i.img}" onerror="this.src='https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=100&h=100'"><span style="flex:1;font-size:13px">${i.title} ×${i.qty}</span><span style="color:#666;font-size:13px">¥${i.price*i.qty}</span></div>`).join('')}
      <div class="oi-total">合计 ¥${o.total}<div style="font-size:11px;color:#999;font-weight:400;margin-top:4px">${o.time}</div></div>
    </div>
  `).join('');
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

initBanner(); renderCats(); renderProducts(); updateCart();
</script>
</body>
</html>
