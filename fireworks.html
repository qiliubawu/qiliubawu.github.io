<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>粒子烟花</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;overflow:hidden;cursor:crosshair;font-family:-apple-system,sans-serif}
canvas{display:block}
.info{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.5);font-size:13px;pointer-events:none;text-align:center}
.info span{color:rgba(255,255,255,.8)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<p class="info">点击屏幕燃放烟花 <span>🎆</span></p>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H,particles=[];
function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
resize();window.onresize=resize;

class Particle{
  constructor(x,y,color){
    this.x=x;this.y=y;this.color=color;
    const angle=Math.random()*Math.PI*2;
    const speed=Math.random()*6+2;
    this.vx=Math.cos(angle)*speed;
    this.vy=Math.sin(angle)*speed;
    this.life=1;this.decay=Math.random()*0.015+0.008;
    this.size=Math.random()*3+1;
  }
  update(){this.x+=this.vx;this.vy+=0.06;this.vx*=0.98;this.vy*=0.98;this.life-=this.decay}
  draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle=`hsla(${this.color},100%,65%,${this.life})`;ctx.fill()}
}

const colors=[0,30,50,280,320];
function burst(x,y){
  const hue=colors[Math.floor(Math.random()*colors.length)];
  for(let i=0;i<80;i++)particles.push(new Particle(x,y,hue));
}
document.addEventListener('click',e=>burst(e.clientX,e.clientY));
setInterval(()=>{const x=Math.random()*W;const y=Math.random()*H*.6;burst(x,y)},3000);

function loop(){
  ctx.fillStyle='rgba(10,10,15,.15)';ctx.fillRect(0,0,W,H);
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.update();p.draw()});
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
