<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拟态控制盘</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:linear-gradient(180deg,#f5f7fa 0%,#e8ecf1 100%);display:flex;align-items:center;justify-content:center;font-family:-apple-system,sans-serif}

.dial-wrap{position:relative;width:280px;height:280px}

/* Outer ring base */
.base{position:absolute;inset:0;border-radius:50%;
  background:linear-gradient(180deg,#ffffff 0%,#f0f4f8 50%,#e2e8f0 100%);
  box-shadow:
    0 20px 40px rgba(0,0,0,.08),
    0 8px 16px rgba(0,0,0,.04),
    inset 0 2px 4px rgba(255,255,255,.8),
    inset 0 -2px 4px rgba(0,0,0,.03);
}
.base::before{content:'';position:absolute;inset:6px;border-radius:50%;
  background:linear-gradient(180deg,#e8ecf1 0%,#dde4ea 50%,#d0d8e0 100%);
  box-shadow:
    inset 0 4px 8px rgba(0,0,0,.12),
    inset 0 -2px 4px rgba(255,255,255,.6),
    0 1px 2px rgba(255,255,255,.5);
}

/* Inner concave area */
.inner-ring{position:absolute;inset:24px;border-radius:50%;
  background:linear-gradient(180deg,#c5cdd6 0%,#b0bac4 50%,#9aa6b2 100%);
  box-shadow:
    inset 0 6px 12px rgba(0,0,0,.25),
    inset 0 12px 24px rgba(0,0,0,.15),
    0 1px 2px rgba(255,255,255,.4);
}
.inner-ring::after{content:'';position:absolute;inset:3px;border-radius:50%;
  background:linear-gradient(180deg,#d0d8e0 0%,#c5cdd6 100%);
  box-shadow:inset 0 2px 4px rgba(0,0,0,.1);
}

/* Center knob */
.knob{position:absolute;width:120px;height:120px;border-radius:50%;
  left:50%;top:50%;margin-left:-60px;margin-top:-60px;
  background:linear-gradient(180deg,#eef2f5 0%,#e2e8f0 50%,#d6dde4 100%);
  box-shadow:
    0 4px 8px rgba(0,0,0,.15),
    0 8px 16px rgba(0,0,0,.08),
    inset 0 1px 2px rgba(255,255,255,.8),
    inset 0 -1px 2px rgba(0,0,0,.05);
  cursor:grab;z-index:10;
  transition:transform .15s ease-out;
}
.knob:active{cursor:grabbing}
.knob::before{content:'';position:absolute;inset:8px;border-radius:50%;
  background:linear-gradient(180deg,#f5f8fa 0%,#eef2f5 100%);
  box-shadow:inset 0 2px 4px rgba(0,0,0,.06);
}

/* 4 dots on knob */
.dot{position:absolute;width:8px;height:8px;border-radius:50%;
  background:#ffffff;
  box-shadow:
    inset 0 1px 2px rgba(0,0,0,.1),
    0 1px 1px rgba(0,0,0,.08);
  z-index:11;
}
.dot:nth-child(1){top:18px;left:50%;margin-left:-4px}
.dot:nth-child(2){bottom:18px;left:50%;margin-left:-4px}
.dot:nth-child(3){left:18px;top:50%;margin-top:-4px}
.dot:nth-child(4){right:18px;top:50%;margin-top:-4px}

/* Direction arrows */
.arrow{position:absolute;font-size:28px;color:#b8c2cc;font-weight:300;pointer-events:none;
  text-shadow:0 1px 2px rgba(255,255,255,.8),0 -1px 1px rgba(0,0,0,.05);
}
.arrow.up{top:-8px;left:50%;margin-left:-14px;color:#d4a574}
.arrow.down{bottom:-8px;left:50%;margin-left:-14px}
.arrow.left{left:-8px;top:50%;margin-top:-14px}
.arrow.right{right:-8px;top:50%;margin-top:-14px}
</style>
</head>
<body>
<div class="dial-wrap" id="dialWrap">
  <div class="arrow up">‹</div>
  <div class="arrow right">›</div>
  <div class="arrow down">›</div>
  <div class="arrow left">‹</div>
  <div class="base"></div>
  <div class="inner-ring"></div>
  <div class="knob" id="knob">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<script>
const wrap=document.getElementById('dialWrap');
const knob=document.getElementById('knob');
let dragging=false;
const maxR=50;
const center=140;

function setKnob(x,y){
  knob.style.transform=`translate(${x}px,${y}px)`;
}

wrap.addEventListener('pointerdown',e=>{
  dragging=true;
  knob.style.transition='none';
  moveKnob(e);
  wrap.setPointerCapture(e.pointerId);
});

wrap.addEventListener('pointermove',e=>{
  if(!dragging)return;
  moveKnob(e);
});

wrap.addEventListener('pointerup',()=>{
  dragging=false;
  knob.style.transition='transform .3s cubic-bezier(.34,1.56,.64,1)';
  setKnob(0,0);
});

wrap.addEventListener('pointerleave',()=>{
  if(dragging){
    dragging=false;
    knob.style.transition='transform .3s cubic-bezier(.34,1.56,.64,1)';
    setKnob(0,0);
  }
});

function moveKnob(e){
  const rect=wrap.getBoundingClientRect();
  let x=e.clientX-rect.left-center,y=e.clientY-rect.top-center;
  const dist=Math.sqrt(x*x+y*y);
  if(dist>maxR){x=x/dist*maxR;y=y/dist*maxR}
  setKnob(x,y);
}
</script>
</body>
</html>
