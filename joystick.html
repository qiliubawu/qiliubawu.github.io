<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拟态摇杆</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(ellipse at center,#1a1a2e 0%,#0a0a14 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,sans-serif;overflow:hidden}

.container{display:flex;flex-direction:column;align-items:center;gap:32px}

.stick-wrap{position:relative;width:220px;height:220px}
.base{position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#3a3a4e,#1a1a28 60%,#0d0d17);
  box-shadow:
    inset 0 2px 4px rgba(255,255,255,.06),
    inset 0 -4px 8px rgba(0,0,0,.5),
    0 8px 32px rgba(0,0,0,.5),
    0 2px 8px rgba(0,0,0,.4),
    0 0 0 1px rgba(255,255,255,.03);
}
.base::after{content:'';position:absolute;inset:4px;border-radius:50%;
  border:2px solid rgba(255,255,255,.04);
}
.ring{position:absolute;inset:16px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#2a2a3d,#141420 70%);
  box-shadow:
    inset 0 4px 8px rgba(0,0,0,.5),
    inset 0 -2px 4px rgba(255,255,255,.03),
    0 0 0 3px rgba(20,20,30,.8),
    0 0 0 4px rgba(255,255,255,.02);
}
.grooves{position:absolute;inset:18px;border-radius:50%;overflow:hidden}
.groove{position:absolute;background:linear-gradient(90deg,transparent,rgba(255,255,255,.015),transparent)}
.groove:nth-child(1){top:0;left:0;right:0;height:1px}
.groove:nth-child(2){top:20%;left:0;right:0;height:1px}
.groove:nth-child(3){top:40%;left:0;right:0;height:1px}
.groove:nth-child(4){top:60%;left:0;right:0;height:1px}
.groove:nth-child(5){top:80%;left:0;right:0;height:1px}
.groove:nth-child(6){top:0;bottom:0;left:20%;width:1px}
.groove:nth-child(7){top:0;bottom:0;left:40%;width:1px}
.groove:nth-child(8){top:0;bottom:0;left:60%;width:1px}
.groove:nth-child(9){top:0;bottom:0;left:80%;width:1px}

.knob{position:absolute;width:90px;height:90px;border-radius:50%;
  left:50%;top:50%;margin-left:-45px;margin-top:-45px;
  background:radial-gradient(circle at 38% 35%,#5a5a72,#2a2a3e 50%,#1a1a28 100%);
  box-shadow:
    0 6px 20px rgba(0,0,0,.5),
    0 2px 6px rgba(0,0,0,.4),
    inset 0 2px 3px rgba(255,255,255,.06),
    inset 0 -2px 4px rgba(0,0,0,.3);
  cursor:grab;transition:box-shadow .2s;
  z-index:2;
}
.knob:active{cursor:grabbing;box-shadow:0 2px 10px rgba(0,0,0,.6),inset 0 1px 2px rgba(255,255,255,.04),inset 0 -1px 2px rgba(0,0,0,.4)}
.knob::after{content:'';position:absolute;inset:12px;border-radius:50%;
  background:radial-gradient(circle at 50% 40%,rgba(255,255,255,.04),transparent 60%);
  border:1px solid rgba(255,255,255,.02);
}
.knob .center-dot{position:absolute;width:12px;height:12px;border-radius:50%;
  background:radial-gradient(circle,#888,#444);
  left:50%;top:50%;margin-left:-6px;margin-top:-6px;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.5);
}
.crosshair{position:absolute;left:50%;top:50%;pointer-events:none}
.crosshair::before,.crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.03)}
.crosshair::before{width:1px;height:156px;left:0;top:-78px}
.crosshair::after{width:156px;height:1px;left:-78px;top:0}

.coords{display:flex;gap:24px}
.coord-box{background:rgba(30,30,50,.6);border:1px solid rgba(255,255,255,.04);border-radius:14px;padding:14px 24px;text-align:center;min-width:90px}
.coord-box .val{font-size:28px;font-weight:200;color:#fff;font-family:'SF Mono',monospace}
.coord-box .lbl{font-size:10px;color:#475569;margin-top:4px;letter-spacing:1px}

.info{position:fixed;bottom:20px;color:rgba(255,255,255,.15);font-size:12px}
</style>
</head>
<body>
<div class="container">
  <div class="stick-wrap" id="stickWrap">
    <div class="base"></div>
    <div class="ring"></div>
    <div class="grooves"><div class="groove"></div><div class="groove"></div><div class="groove"></div><div class="groove"></div><div class="groove"></div><div class="groove"></div><div class="groove"></div><div class="groove"></div><div class="groove"></div></div>
    <div class="crosshair"></div>
    <div class="knob" id="knob"><div class="center-dot"></div></div>
  </div>
  <div class="coords">
    <div class="coord-box"><div class="val" id="coordX">0.00</div><div class="lbl">X 轴</div></div>
    <div class="coord-box"><div class="val" id="coordY">0.00</div><div class="lbl">Y 轴</div></div>
    <div class="coord-box"><div class="val" id="coordR">0.00</div><div class="lbl">力度</div></div>
  </div>
</div>
<p class="info">拖动摇杆 · 松开自动回中</p>

<script>
const stick=document.getElementById('stickWrap');
const knob=document.getElementById('knob');
const cx=document.getElementById('coordX'),cy=document.getElementById('coordY'),cr=document.getElementById('coordR');
let dragging=false;
const maxR=65; // max distance knob can travel
const baseSize=220,knobSize=90;
const center=baseSize/2;
let animId=null;
let targetX=0,targetY=0,currentX=0,currentY=0;

function updateKnob(x,y){
  currentX+=(x-currentX)*0.25;currentY+=(y-currentY)*0.25;
  knob.style.transform=`translate(${currentX}px,${currentY}px)`;
  const dist=Math.sqrt(currentX*currentX+currentY*currentY);
  cx.textContent=(currentX/maxR).toFixed(2);
  cy.textContent=(-currentY/maxR).toFixed(2);
  cr.textContent=Math.min(dist/maxR,1).toFixed(2);
  if(Math.abs(currentX-x)>.1||Math.abs(currentY-y)>.1)animId=requestAnimationFrame(()=>updateKnob(x,y));
  else animId=null;
}

stick.addEventListener('pointerdown',e=>{
  dragging=true;knob.style.transition='none';moveKnob(e);
  stick.setPointerCapture(e.pointerId);
});
stick.addEventListener('pointermove',e=>{if(dragging)moveKnob(e)});
stick.addEventListener('pointerup',()=>{
  dragging=false;knob.style.transition='transform .35s cubic-bezier(.34,1.56,.64,1)';
  targetX=0;targetY=0;if(animId)cancelAnimationFrame(animId);
  updateKnob(0,0);
});
stick.addEventListener('pointerleave',()=>{if(dragging){dragging=false;knob.style.transition='transform .35s cubic-bezier(.34,1.56,.64,1)';targetX=0;targetY=0;if(animId)cancelAnimationFrame(animId);updateKnob(0,0)}});

function moveKnob(e){
  const rect=stick.getBoundingClientRect();
  let x=e.clientX-rect.left-center,y=e.clientY-rect.top-center;
  const dist=Math.sqrt(x*x+y*y);
  if(dist>maxR){x=x/dist*maxR;y=y/dist*maxR}
  targetX=x;targetY=y;
  if(!animId)updateKnob(x,y);
}
</script>
</body>
</html>
