<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 天气 UI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,sans-serif;perspective:1000px;padding:20px}
.scene{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;align-items:center}
.card{width:300px;padding:32px;border-radius:24px;position:relative;overflow:hidden;transition:transform .4s ease;cursor:default}
.card:hover{transform:translateY(-6px) rotateY(4deg) rotateX(2deg)}
.card::before{content:'';position:absolute;inset:0;border-radius:24px;background:inherit;filter:blur(0);z-index:-1}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent)}

/* Card 1 - Sunny */
.card1{background:linear-gradient(160deg,#1e293b,#0f172a);border:1px solid rgba(255,255,255,.06);box-shadow:0 20px 50px rgba(59,130,246,.08),0 0 0 1px rgba(59,130,246,.04)}
.card1 .city{color:#94a3b8;font-size:13px;letter-spacing:1px}
.card1 .temp{font-size:64px;font-weight:200;color:#fff;line-height:1;margin:12px 0 4px}
.card1 .desc{color:#3b82f6;font-size:14px;font-weight:600;margin-bottom:24px}
.card1 .sun{position:absolute;top:20px;right:28px;width:80px;height:80px;background:radial-gradient(circle,#fbbf24,#f59e0b 40%,transparent 70%);border-radius:50%;animation:sunPulse 3s ease-in-out infinite;box-shadow:0 0 60px rgba(251,191,36,.25),0 0 120px rgba(251,191,36,.1)}
@keyframes sunPulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.06);opacity:1}}
.card1 .row{display:flex;justify-content:space-between;padding:12px 0;border-top:1px solid rgba(255,255,255,.04)}
.card1 .row .label{color:#475569;font-size:11px}
.card1 .row .val{color:#e2e8f0;font-size:13px;font-weight:600}

/* Card 2 - Rain */
.card2{background:linear-gradient(160deg,#1e293b,#0c1929);border:1px solid rgba(255,255,255,.04);box-shadow:0 20px 50px rgba(6,182,212,.06)}
.card2 .city{color:#94a3b8;font-size:13px;letter-spacing:1px}
.card2 .temp{font-size:64px;font-weight:200;color:#fff;line-height:1;margin:12px 0 4px}
.card2 .desc{color:#06b6d4;font-size:14px;font-weight:600;margin-bottom:24px}
.card2 .clouds{position:absolute;top:16px;right:24px}
.card2 .cloud{width:60px;height:36px;background:#475569;border-radius:50px;position:relative}
.card2 .cloud::before,.card2 .cloud::after{content:'';position:absolute;background:#475569;border-radius:50%}
.card2 .cloud::before{width:30px;height:30px;top:-14px;left:12px}
.card2 .cloud::after{width:22px;height:22px;top:-8px;left:32px}
.card2 .rain{position:absolute;top:56px;right:10px;display:flex;gap:6px}
.card2 .drop{width:2px;height:14px;background:#06b6d4;border-radius:1px;animation:rain .6s linear infinite}
.card2 .drop:nth-child(2){animation-delay:.2s;height:10px}
.card2 .drop:nth-child(3){animation-delay:.4s;height:16px}
.card2 .drop:nth-child(4){animation-delay:.1s;height:8px}
.card2 .drop:nth-child(5){animation-delay:.3s;height:12px}
@keyframes rain{0%{transform:translateY(0);opacity:1}100%{transform:translateY(18px);opacity:.2}}
.card2 .row{display:flex;justify-content:space-between;padding:12px 0;border-top:1px solid rgba(255,255,255,.04)}
.card2 .row .label{color:#475569;font-size:11px}
.card2 .row .val{color:#e2e8f0;font-size:13px;font-weight:600}

/* Card 3 - Snow */
.card3{background:linear-gradient(160deg,#1e293b,#111827);border:1px solid rgba(255,255,255,.04);box-shadow:0 20px 50px rgba(255,255,255,.03)}
.card3 .city{color:#94a3b8;font-size:13px;letter-spacing:1px}
.card3 .temp{font-size:64px;font-weight:200;color:#fff;line-height:1;margin:12px 0 4px}
.card3 .desc{color:#cbd5e1;font-size:14px;font-weight:600;margin-bottom:24px}
.card3 .snowflakes{position:absolute;top:0;right:0;width:100%;height:100%;pointer-events:none;overflow:hidden}
.card3 .flake{position:absolute;background:#fff;border-radius:50%;animation:fall linear infinite;opacity:.6}
@keyframes fall{0%{transform:translateY(-40px) rotate(0);opacity:0}10%{opacity:.7}90%{opacity:.7}100%{transform:translateY(320px) rotate(360deg);opacity:0}}
.card3 .row{display:flex;justify-content:space-between;padding:12px 0;border-top:1px solid rgba(255,255,255,.04)}
.card3 .row .label{color:#475569;font-size:11px}
.card3 .row .val{color:#e2e8f0;font-size:13px;font-weight:600}

/* Forecast row */
.forecast{display:flex;gap:12px;margin-bottom:16px}
.day{flex:1;text-align:center;padding:10px 4px;background:rgba(255,255,255,.02);border-radius:12px;transition:.2s}
.day:hover{background:rgba(255,255,255,.04)}
.day .d{font-size:10px;color:#475569;margin-bottom:6px}
.day .icon{font-size:20px;margin-bottom:4px}
.day .hi{font-size:12px;color:#fff;font-weight:600}
.day .lo{font-size:12px;color:#475569;margin-left:4px}

.info{position:fixed;bottom:20px;color:rgba(255,255,255,.2);font-size:12px}
</style>
</head>
<body>
<div class="scene">
  <!-- Sunny Card -->
  <div class="card card1">
    <div class="city">SHANGHAI</div>
    <div class="temp">28°</div>
    <div class="desc">晴朗 · Sunny</div>
    <div class="sun"></div>
    <div class="forecast">
      <div class="day"><div class="d">明天</div><div class="icon">☀️</div><span class="hi">30°</span><span class="lo">22°</span></div>
      <div class="day"><div class="d">周三</div><div class="icon">⛅</div><span class="hi">27°</span><span class="lo">20°</span></div>
      <div class="day"><div class="d">周四</div><div class="icon">🌧️</div><span class="hi">24°</span><span class="lo">18°</span></div>
    </div>
    <div class="row"><span class="label">湿度</span><span class="val">45%</span></div>
    <div class="row"><span class="label">风速</span><span class="val">12 km/h</span></div>
    <div class="row"><span class="label">紫外线</span><span class="val">强</span></div>
  </div>

  <!-- Rain Card -->
  <div class="card card2">
    <div class="city">LONDON</div>
    <div class="temp">15°</div>
    <div class="desc">小雨 · Drizzle</div>
    <div class="clouds"><div class="cloud"></div></div>
    <div class="rain"><div class="drop"></div><div class="drop"></div><div class="drop"></div><div class="drop"></div><div class="drop"></div></div>
    <div class="forecast">
      <div class="day"><div class="d">明天</div><div class="icon">🌧️</div><span class="hi">16°</span><span class="lo">11°</span></div>
      <div class="day"><div class="d">周三</div><div class="icon">⛅</div><span class="hi">18°</span><span class="lo">10°</span></div>
      <div class="day"><div class="d">周四</div><div class="icon">☁️</div><span class="hi">14°</span><span class="lo">9°</span></div>
    </div>
    <div class="row"><span class="label">湿度</span><span class="val">82%</span></div>
    <div class="row"><span class="label">风速</span><span class="val">18 km/h</span></div>
    <div class="row"><span class="label">降水量</span><span class="val">2.3 mm</span></div>
  </div>

  <!-- Snow Card -->
  <div class="card card3">
    <div class="city">BEIJING</div>
    <div class="temp">-3°</div>
    <div class="desc">小雪 · Light Snow</div>
    <div class="snowflakes" id="snowZone"></div>
    <div class="forecast">
      <div class="day"><div class="d">明天</div><div class="icon">❄️</div><span class="hi">-1°</span><span class="lo">-8°</span></div>
      <div class="day"><div class="d">周三</div><div class="icon">☁️</div><span class="hi">2°</span><span class="lo">-5°</span></div>
      <div class="day"><div class="d">周四</div><div class="icon">☀️</div><span class="hi">5°</span><span class="lo">-3°</span></div>
    </div>
    <div class="row"><span class="label">湿度</span><span class="val">68%</span></div>
    <div class="row"><span class="label">风速</span><span class="val">22 km/h</span></div>
    <div class="row"><span class="label">体感温度</span><span class="val">-8°</span></div>
  </div>
</div>
<p class="info">3D 透视 · 玻璃拟态 · 悬停旋转</p>

<script>
const zone=document.getElementById('snowZone');
for(let i=0;i<20;i++){
  const f=document.createElement('div');f.className='flake';
  f.style.left=Math.random()*100+'%';
  f.style.width=f.style.height=(Math.random()*4+2)+'px';
  f.style.animationDuration=(Math.random()*4+3)+'s';
  f.style.animationDelay=Math.random()*3+'s';
  zone.appendChild(f);
}
</script>
</body>
</html>
